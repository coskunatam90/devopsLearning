name: Docker Build and Push

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Docker Hub'a giriş yap
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Image oluştur ve push et
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: coskunatam90/merhaba-python:latest

      - name: AWS EC2'ya deploy et
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.AWSUSER }}
          key: ${{ secrets.EC2_SSH_KEY}}
          script: |
            docker pull coskunatam90/merhaba-python:latest
            docker stop merhaba-container || true
            docker rm merhaba-container || true
            docker run --name merhaba-container coskunatam90/merhaba-python:latest